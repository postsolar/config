unbind_default_keys = true
theme = "amberwood-fixed"

[editor]
shell = [ "zsh", "-c" ]
scrolloff = 1000
mouse = false
cursorline = true
gutters = [ "diagnostics", "diff" ]
color-modes = true
auto-format = false
preview-completion-insert = false
bufferline = "multiple"
smart-tab = { enable = false }
auto-pairs = false
file-picker = { hidden = false }

[editor.statusline]
left = [ "mode", "spinner", "version-control" ]
center = [ "file-name" ]
right = [ "file-modification-indicator", "read-only-indicator", "diagnostics", "selections", "register", "position", "separator", "total-line-numbers" ]
separator = "/"
mode.normal = "n"
mode.insert = "i"
mode.select = "s"

[editor.lsp]
display-messages = true
auto-signature-help = false

[editor.whitespace]
render = { newline = "all" }
characters = { newline = "" }
